<!DOCTYPE html>
<html>
<head>
  <title>Register | KPass</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="theme-toggle auth-theme-toggle" data-theme-toggle type="button">Dark</button>
  <div class="page">
    <div class="card">
      <div class="logo">KPass</div>
      <div class="subtitle">Create your account.</div>

      <form id="registerForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Login Password" required>
        <input type="password" id="masterPassword" placeholder="Master Password" required>
        <button type="submit">Register</button>
      </form>

      <p>Already have an account? <a class="link" href="login.html">Login</a></p>
      <div id="message" class="message"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = document.getElementById("message");
      message.className = "message";
      message.textContent = "Creating account...";

      try {
        await apiRequest("/auth/register", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("email").value,
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
            master_password: document.getElementById("masterPassword").value
          })
        });

        message.textContent = "Account created. Redirecting...";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 800);
      } catch (err) {
        message.className = "message error";
        message.textContent = err.message;
      }
    });
  </script>
</body>
</html>
